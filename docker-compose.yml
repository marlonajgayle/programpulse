services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: programpulse-mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YPa55w0rd2026
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: programpulse-mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  mssql_data:
    driver: local
  mailpit_data:
    driver: local
